name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  docker-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t mcp-peek:ci -f docker/Dockerfile .
      - name: JSON-RPC roundtrip
        run: |
          cat > /tmp/rpc.txt <<'RPC'
          {"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}
          {"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}
          RPC
          timeout 15 docker run -i --rm mcp-peek:ci < /tmp/rpc.txt > /tmp/rpc-out.txt || true
          cat /tmp/rpc-out.txt
          grep -q '"http_request"' /tmp/rpc-out.txt
          grep -q '"http_read"' /tmp/rpc-out.txt
          grep -q '"http_inspect"' /tmp/rpc-out.txt
